<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff7043">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bắt Thú">
<link rel="apple-touch-icon" id="apple-icon">
<title>Bắt Thú Dễ Thương 🐱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Segoe UI', sans-serif; background: #fff9f0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 12px; touch-action: manipulation;
  }
  h1 { font-size: clamp(20px,5vw,28px); color: #e65100; margin-bottom: 10px; text-align: center; }
  #score-bar { display: flex; gap: 16px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; justify-content: center; }
  .stat { font-size: clamp(15px,4vw,20px); font-weight: 600; color: #333; }
  .stat.best { color: #9c27b0; }
  #timer-bar { width: 100%; max-width: 540px; height: 10px; background: #e0e0e0; border-radius: 5px; margin-bottom: 6px; overflow: hidden; }
  #timer-fill { height: 100%; background: #66bb6a; border-radius: 5px; transition: width 0.2s linear; }
  #msg { font-size: clamp(16px,4vw,22px); font-weight: 600; color: #e65100; min-height: 28px; text-align: center; margin-bottom: 6px; }
  #game-area {
    position: relative; width: 100%; max-width: 540px;
    height: clamp(280px, 48vw, 380px);
    background: linear-gradient(180deg, #b3e5fc 0%, #e0f7fa 60%, #c8e6c9 100%);
    border-radius: 20px; border: 3px solid #81d4fa; overflow: hidden;
    touch-action: none;
  }
  .cloud { position: absolute; font-size: 36px; opacity: 0.55; animation: drift linear infinite; }
  @keyframes drift { from { transform: translateX(-70px); } to { transform: translateX(620px); } }
  .animal { position: absolute; cursor: pointer; line-height: 1; animation: bounce ease-in-out infinite alternate; will-change: transform; }
  .animal.size-normal { font-size: clamp(32px,7vw,44px); }
  .animal.size-big    { font-size: clamp(46px,10vw,62px); }
  .animal.poop { animation: wobble ease-in-out infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
  @keyframes wobble { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }
  .pop { position: absolute; pointer-events: none; animation: pop 0.38s forwards; line-height: 1; }
  .pop.size-normal { font-size: clamp(32px,7vw,44px); }
  .pop.size-big    { font-size: clamp(46px,10vw,62px); }
  @keyframes pop { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2.6) translateY(-28px);opacity:0} }
  .score-pop { position: absolute; font-size: 20px; font-weight: 700; pointer-events: none; animation: scoreFloat 0.8s forwards; white-space: nowrap; }
  @keyframes scoreFloat { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-50px);opacity:0} }
  #overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 18px; gap: 8px; padding: 16px; text-align: center;
  }
  #overlay .big { font-size: clamp(44px,10vw,64px); }
  #overlay .title { font-size: clamp(18px,4.5vw,24px); font-weight: 700; color: #333; }
  #overlay .sub { font-size: clamp(13px,3vw,15px); color: #666; }
  #overlay .best-line { font-size: clamp(13px,3vw,15px); color: #9c27b0; font-weight: 600; }
  #start-btn {
    margin-top: 10px; font-size: clamp(16px,4vw,20px); padding: 12px 36px;
    border-radius: 30px; border: none; background: #ff7043; color: white;
    cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(255,112,67,0.4);
    transition: background 0.2s, transform 0.1s; touch-action: manipulation; -webkit-appearance: none;
  }
  #start-btn:active { transform: scale(0.96); background: #e64a19; }
  #start-btn:disabled { background: #bbb; cursor: default; box-shadow: none; }
  .grass { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; background: #81c784; border-radius: 0 0 18px 18px; pointer-events: none; }
  .deco { position: absolute; bottom: 36px; pointer-events: none; }
  .star { font-size: 32px; letter-spacing: 4px; }
  #sound-btn {
    position: fixed; top: 12px; right: 14px;
    background: #fff3e0; border: 2px solid #ffcc80; border-radius: 50%;
    width: 40px; height: 40px; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12); z-index: 99;
    touch-action: manipulation;
  }
</style>
</head>
<body>
<button id="sound-btn" onclick="toggleSound()" title="Bật/tắt âm thanh">🔊</button>
<h1>🌟 Bắt Thú Dễ Thương! 🌟</h1>
<div id="score-bar">
  <div class="stat">⭐ <span id="score">0</span></div>
  <div class="stat">⏰ <span id="timer">30</span>s</div>
  <div class="stat">🎯 Level <span id="level">1</span></div>
  <div class="stat best">🏅 Kỷ lục: <span id="best">0</span></div>
</div>
<div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
<div id="msg"></div>
<div id="game-area">
  <div class="cloud" style="top:8px;animation-duration:9s;animation-delay:-2s">☁️</div>
  <div class="cloud" style="top:26px;font-size:24px;animation-duration:14s;animation-delay:-7s">☁️</div>
  <div class="grass"></div>
  <div class="deco" style="left:8px">🌿</div>
  <div class="deco" style="right:14px">🌵</div>
  <div class="deco" style="left:44%">🌸</div>
  <div id="overlay">
    <div class="big">🐱🐶🐰</div>
    <div class="title">Bắt Thú Dễ Thương!</div>
    <div class="sub">Chạm vào thú để bắt 🌟<br>Tránh 💩 — bấm trúng bị trừ điểm!</div>
    <div class="sub" style="margin-top:4px">🐱 nhỏ = +2 điểm &nbsp;|&nbsp; 🐱 to = +1 điểm</div>
  </div>
</div>
<button id="start-btn" onclick="startGame()">▶ Bắt đầu chơi!</button>

<script>
// ── PWA: Icon + Manifest ──────────────────────────────────────────────────
(function generateIcon(){
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0,'#ffcc02'); grad.addColorStop(1,'#ff7043');
  ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();
  ctx.font='280px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐱',size/2,size/2+10);
  ctx.font='110px serif'; ctx.fillText('⭐',size*0.75,size*0.25);
  const dataUrl = c.toDataURL('image/png');
  document.getElementById('apple-icon').href = dataUrl;
  const manifest = {
    name:'Bắt Thú Dễ Thương', short_name:'Bắt Thú',
    description:'Game bắt thú dễ thương cho bé!',
    start_url:'.', display:'standalone',
    background_color:'#fff9f0', theme_color:'#ff7043', orientation:'portrait',
    icons:[
      {src:dataUrl,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:dataUrl,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link = document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

if('serviceWorker' in navigator){
  const sw=`const C='bat-thu-v1';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})),{scope:'./'}).catch(()=>{});
}

// ── Speech (Web Speech API) ───────────────────────────────────────────────
let soundOn = true;
let speaking = false;
let voiceReady = false;
let viVoice = null;

function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
  if(!soundOn) window.speechSynthesis.cancel();
}

// Pre-load voices (needed on iOS/Android)
function loadVoices(){
  const voices = window.speechSynthesis.getVoices();
  // Prefer Vietnamese voice, fallback to any available
  viVoice = voices.find(v => v.lang.startsWith('vi'))
         || voices.find(v => v.lang.startsWith('en'))
         || voices[0] || null;
  voiceReady = true;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function speak(text){
  if(!soundOn || !('speechSynthesis' in window)) return;
  // iOS requires cancel before new utterance
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(viVoice) u.voice = viVoice;
  u.lang  = viVoice ? viVoice.lang : 'vi-VN';
  u.rate  = 1.05;
  u.pitch = 1.3;   // cao hơn chút cho cute
  u.volume = 1;
  u.onend = () => { speaking = false; };
  speaking = true;
  window.speechSynthesis.speak(u);
}

// iOS Safari suspends speechSynthesis after ~30s idle — resume on touch
document.addEventListener('touchstart', () => {
  if(window.speechSynthesis.paused) window.speechSynthesis.resume();
}, {passive: true});

// ── Beep sounds via AudioContext ──────────────────────────────────────────
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(freq, dur, type='sine', vol=0.25){
  if(!soundOn) return;
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function playWin(){
  playBeep(523, 0.1); // C5
  setTimeout(()=>playBeep(659, 0.1), 100); // E5
  setTimeout(()=>playBeep(784, 0.18), 200); // G5
}
function playBig(){
  playBeep(440, 0.12);
  setTimeout(()=>playBeep(550, 0.15), 120);
}
function playPoop(){
  playBeep(200, 0.15, 'sawtooth', 0.2);
  setTimeout(()=>playBeep(150, 0.2, 'sawtooth', 0.15), 150);
}
function playEnd(){
  playBeep(784,0.1); setTimeout(()=>playBeep(659,0.1),120);
  setTimeout(()=>playBeep(523,0.1),240); setTimeout(()=>playBeep(440,0.25),360);
}

// ── Game vars ─────────────────────────────────────────────────────────────
const ANIMALS = ['🐱','🐶','🐰','🐼','🐸','🦊','🐨','🐯','🐮','🦋','🐙','🐬','🦄','🐧','🐥','🐿️','🦝','🦙','🦁','🐻','🦌','🐓','🦜','🐠','🦭'];
const POOP = '💩';
const MSGS_WIN  = ['Ný giỏi quá! 🌟','Tuyệt vời! ✨','Siêu đỉnh! 🎉','Bé giỏi quá! 💖','Wow wow! 🌈','Bắt được rồi! 🥳'];
const MSGS_POOP = ['Cẩn thận Ný ơi! 💩','Bẩn tay rồi! 😱','Tránh ra nhé! 🙈','Aww noooo 😅'];
// Câu nói to ra loa (chỉ những câu quan trọng)
const SPEAK_WIN_NORMAL = ['Ní giỏi quá', 'Tuyệt vời'];
const SPEAK_WIN_BIG    = ['Ní giỏi quá'];   // điểm cao (thú nhỏ +2)
const SPEAK_POOP       = ['Cẩn thận Ní ơi', 'Ôi không, chánh ra Ní ơi'];

let score=0, timeLeft=30, level=1, running=false;
let interval=null, spawnTimer=null, animals=[], animalId=0;
let catchCount=0; // đếm để không nói liên tục
let bestScore = parseInt(localStorage.getItem('batThuBest')||'0');

function updateBest(){ document.getElementById('best').textContent = bestScore; }
updateBest();

function startGame(){
  score=0; timeLeft=30; level=1; running=true; animals=[]; catchCount=0;
  setScore(0);
  document.getElementById('timer').textContent=30;
  document.getElementById('level').textContent=1;
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('timer-fill').style.background='#66bb6a';
  document.getElementById('msg').textContent='';
  document.getElementById('overlay').style.display='none';
  document.getElementById('start-btn').textContent='⏹ Đang chơi...';
  document.getElementById('start-btn').disabled=true;
  clearAllAnimals();
  // Unlock AudioContext on first user gesture
  try { getAudio().resume(); } catch(e){}
  spawnAnimal(); spawnAnimal();
  clearInterval(interval);
  interval = setInterval(tick, 1000);
  scheduleSpawn();
}

function setScore(v){ score=v; document.getElementById('score').textContent=score; }

function scheduleSpawn(){
  if(!running) return;
  const delay = Math.max(300, 1000 - level*70);
  spawnTimer = setTimeout(()=>{ spawnAnimal(); scheduleSpawn(); }, delay);
}

function tick(){
  if(!running) return;
  timeLeft--;
  document.getElementById('timer').textContent=timeLeft;
  document.getElementById('timer-fill').style.width=(timeLeft/30*100)+'%';
  if(timeLeft<=7) document.getElementById('timer-fill').style.background='#ef5350';
  if(score >= level*8){ level++; document.getElementById('level').textContent=level; }
  if(timeLeft<=0) endGame();
}

function spawnAnimal(){
  if(!running) return;
  if(animals.length >= 3+level) return;
  const area = document.getElementById('game-area');
  const isPoop = Math.random() < (0.12 + level*0.02);
  const isBig  = !isPoop && Math.random() < 0.35;
  const emoji  = isPoop ? POOP : ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
  const sizeClass = isBig ? 'size-big' : 'size-normal';
  const pts = isPoop ? -2 : (isBig ? 1 : 2);

  const id = 'a'+(animalId++);
  const el = document.createElement('div');
  el.className = 'animal '+sizeClass+(isPoop?' poop':'');
  el.id=id; el.textContent=emoji;
  el.dataset.pts=pts; el.dataset.isPoop=isPoop?'1':'0';

  const margin = isBig ? 12 : 6;
  el.style.left = (margin + Math.random()*(100-margin*2))+'%';
  el.style.top  = (4 + Math.random()*66)+'%';
  const dur = Math.max(1.0, 3.0 - level*0.15);
  el.style.animationDuration = dur+'s';

  const onCatch = (e) => { e.preventDefault(); e.stopPropagation(); catchAnimal(id,el,emoji,pts,sizeClass,isPoop); };
  el.addEventListener('touchstart', onCatch, {passive:false});
  el.addEventListener('mousedown',  onCatch);
  area.appendChild(el);
  animals.push(id);
  setTimeout(()=>{ if(document.getElementById(id)) removeAnimal(id); }, Math.max(1500, dur*1600));
}

function catchAnimal(id, el, emoji, pts, sizeClass, isPoop){
  if(!running || !document.getElementById(id)) return;
  setScore(Math.max(0, score+pts));
  catchCount++;

  let displayMsg, speakText;
  if(isPoop){
    displayMsg = MSGS_POOP[Math.floor(Math.random()*MSGS_POOP.length)];
    speakText  = SPEAK_POOP[Math.floor(Math.random()*SPEAK_POOP.length)];
    playPoop();
    speak(speakText);
  } else if(pts===2){
    // thú nhỏ — điểm cao
    displayMsg = 'Ný giỏi quá! 🌟';
    speakText  = SPEAK_WIN_BIG[0]; // SPEAK_WIN_BIG đã dùng "Ní"
    playWin();
    // nói mỗi 2 lần bắt để không quá ồn
    if(catchCount % 2 === 1) speak(speakText);
  } else {
    // thú to — điểm thường
    displayMsg = MSGS_WIN[1 + Math.floor(Math.random()*(MSGS_WIN.length-1))];
    playBig();
    // không cần nói to, chỉ beep
  }

  document.getElementById('msg').textContent = displayMsg;
  setTimeout(()=>{ if(document.getElementById('msg').textContent===displayMsg) document.getElementById('msg').textContent=''; }, 900);

  const area = document.getElementById('game-area');
  const pop=document.createElement('div'); pop.className='pop '+sizeClass; pop.textContent=emoji;
  pop.style.left=el.style.left; pop.style.top=el.style.top;
  area.appendChild(pop); setTimeout(()=>{ if(pop.parentNode) pop.parentNode.removeChild(pop); },400);

  const sp=document.createElement('div'); sp.className='score-pop';
  sp.style.left=el.style.left; sp.style.top=el.style.top;
  sp.style.color = pts<0?'#e53935':(pts===1?'#ff9800':'#388e3c');
  sp.textContent = pts>0?'+'+pts:pts;
  area.appendChild(sp); setTimeout(()=>{ if(sp.parentNode) sp.parentNode.removeChild(sp); },850);

  removeAnimal(id);
}

function removeAnimal(id){
  const el=document.getElementById(id);
  if(el && el.parentNode) el.parentNode.removeChild(el);
  animals=animals.filter(a=>a!==id);
}

function clearAllAnimals(){ [...animals].forEach(id=>removeAnimal(id)); animals=[]; }

function endGame(){
  running=false; clearInterval(interval); clearTimeout(spawnTimer); clearAllAnimals();
  const isNewBest = score>bestScore;
  if(isNewBest){ bestScore=score; localStorage.setItem('batThuBest',bestScore); updateBest(); }
  playEnd();
  if(score>=20) setTimeout(()=>speak('Xuất sắc! Ní siêu giỏi!'),400);
  else if(score>=10) setTimeout(()=>speak('Rất tốt! Ní giỏi lắm!'),400);
  else setTimeout(()=>speak('Cố lên Ní ơi, chơi lại nha!'),400);
  const stars = score>=20?3:score>=10?2:1;
  const overlay=document.getElementById('overlay');
  overlay.innerHTML=`
    <div class="big">${score>=20?'🏆':score>=10?'🎉':'😊'}</div>
    <div class="title">Bé bắt được <b>${score}</b> điểm!</div>
    <div class="star">${'⭐'.repeat(stars)}</div>
    ${isNewBest?'<div class="best-line">🏅 Kỷ lục mới! Tuyệt vời!</div>':`<div class="best-line">🏅 Kỷ lục: ${bestScore} điểm</div>`}
    <div class="sub">${score>=20?'Xuất sắc! Bé siêu giỏi! 🥳':score>=10?'Rất tốt! Chơi nữa đi! 🌟':'Cố lên! Bé làm được mà! 💪'}</div>`;
  overlay.style.display='flex';
  document.getElementById('start-btn').textContent='🔄 Chơi lại!';
  document.getElementById('start-btn').disabled=false;
  document.getElementById('timer-fill').style.background='#66bb6a';
  document.getElementById('timer-fill').style.width='100%';
}
</script>
</body>
</html>
